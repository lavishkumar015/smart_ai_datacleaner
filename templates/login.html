<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f7f3ef;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    width: 360px;
    padding: 40px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: fadeUp 0.8s ease;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

input:focus {
    border-color: #7b2ff7;
    outline: none;
}

/* BUTTON */
.btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#7b2ff7,#2575fc);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* LINKS */
.links {
    text-align: center;
    margin-top: 15px;
}

.links a {
    display: block;
    margin-top: 5px;
    text-decoration: none;
    color: #555;
}

/* ANIMATION */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button class="btn">Login</button>

    <div class="links">
        <a href="/forgot_password/">Forgot Password?</a>
        <a href="/signup/">Create Account</a>
    </div>
</div>

</body>
</html>
