<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f7f3ef;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 360px;
    padding: 40px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeUp 0.8s ease;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff6a00,#ff00cc);
    color: white;
    cursor: pointer;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>Reset Password</h2>

    <input type="email" placeholder="Enter your email">

    <button>Send Reset Link</button>
</div>

</body>
</html>
