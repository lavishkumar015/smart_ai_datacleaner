<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f7f3ef;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 360px;
    padding: 40px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: fadeUp 0.8s ease;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#7b2ff7);
    color: white;
    cursor: pointer;
}

.links {
    text-align: center;
    margin-top: 15px;
}

.links a {
    text-decoration: none;
    color: #555;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <input type="text" placeholder="Username">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button class="btn">Signup</button>

    <div class="links">
        <a href="/login/">Already have account? Login</a>
    </div>
</div>

</body>
</html>
